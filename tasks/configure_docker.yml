---
- name: Fluentd | Ensure main config file
  template:
    src: fluentd.conf
    dest: "{{ fluentd_conf_path }}"

- name: Fluentd | Ensure Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ fluentd_deploy_dir }}/docker-compose.yml"

# community.docker.docker_compose_v2 reconciles the actual running state
# against the Compose file on every run (idempotent, proper changed
# detection) - unlike a handler, it doesn't depend on the templates above
# having reported changed, so a stack stopped/removed out-of-band still
# gets brought back up.
- name: Fluentd | Ensure Fluentd Docker Compose stack is running
  community.docker.docker_compose_v2:
    project_src: "{{ fluentd_deploy_dir }}"
    state: present
    remove_orphans: true
