---
- name: Check Fluentd Configuration
  command: fluentd --dry-run -c /etc/fluent/fluentd.conf
  register: config_check
  failed_when: config_check.rc != 0
  notify:
    - Restart and enabled Fluentd

- name: Restart and enabled Fluentd
  service:
    name: fluentd
    enabled: true
    state: restarted

- name: Check Fluentd Docker Configuration
  command: >-
    docker run --rm --entrypoint fluentd
    -v {{ fluentd_conf_path }}:/fluentd/etc/fluentd.conf:ro
    {{ fluentd_image }}
    --dry-run -c /fluentd/etc/fluentd.conf
  register: fluentd_docker_config_check
  failed_when: fluentd_docker_config_check.rc != 0
  changed_when: false
  notify:
    - Apply Fluentd Docker Compose

- name: Apply Fluentd Docker Compose
  command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ fluentd_deploy_dir }}"

- name: Restart Docker daemon
  service:
    name: docker
    state: restarted
  when: fluentd_docker_restart_allowed | bool
