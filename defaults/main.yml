---
# true if td-agent v4 is installed on the host
fluentd_migrate_to_v5: false
fluentd_del_old_conf: false

# for ssl 
ssl_directory_path: "/etc/ssl_certs"
domain_directory: "example.com"

log_path: /var/log/fluent

install_url: https://fluentd.cdn.cncf.io/lts/6/ubuntu/{{ ansible_distribution_release|string }}/pool/contrib/f/fluent-lts-apt-source/fluent-lts-apt-source_2025.9.29-1_all.deb

# Set to true to run Fluentd as a Docker Compose service instead of the
# native fluent-package install. fluentd_config/ssl_directory_path are used
# the same way in both modes; fluentd_plugins only applies to native mode
# (see README's "Running Fluentd in Docker Compose" section for extra
# plugins in Docker mode).
fluentd_in_docker: false

# --- Docker Compose deployment (only used when fluentd_in_docker: true) ---
fluentd_deploy_dir: /opt/fluentd
fluentd_conf_path: /etc/fluent/fluentd.conf
fluentd_image: "grafana/fluent-plugin-loki:main"
fluentd_container_name: fluentd
fluentd_compose_extra_volumes: []
fluentd_compose_extra_env: {}

# Collect logs from Swarm services (and any other container) running on
# this node: Docker's daemon-wide default log-driver is set to fluentd, so
# Docker itself ships every container's stdout/stderr to Fluentd's
# forward input below.
fluentd_manage_docker_log_driver: true
fluentd_forward_bind: "127.0.0.1"
fluentd_forward_port: 24224
fluentd_docker_log_tag: "swarm.{{ '{{' }}.Name{{ '}}' }}"
fluentd_docker_log_opts:
  fluentd-address: "{{ fluentd_forward_bind }}:{{ fluentd_forward_port }}"
  fluentd-async: "true"
  fluentd-retry-wait: "1s"
  fluentd-max-retries: "30"
  tag: "{{ fluentd_docker_log_tag }}"

# Restarting the Docker daemon restarts every container on this node
# (including all running Swarm tasks). Off by default — apply the change
# manually with `systemctl restart docker` during a maintenance window,
# or set this to true to let the role restart it.
fluentd_docker_restart_allowed: false

fluentd_plugins:
  - fluent-plugin-grafana-loki
  - fluent-plugin-systemd
  - fluent-plugin-prometheus

fluentd_config:
  - directive: system
    data:
      - |
        process_name fluentd
          log_level warn

          # https://docs.fluentd.org/deployment/logging#log-rotation-setting
          <log>
            rotate_age 5
            rotate_size 1048576
          </log>

  - directive: source
    data:
      - |
        @type prometheus
          port 24231

  - directive: source
    data:
      - |
        @type prometheus_monitor

  - directive: source
    data:
      - |
        @type prometheus_output_monitor
